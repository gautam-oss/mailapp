{% extends "base.html" %}
{% block title %}Compose — MailApp{% endblock %}

{% block content %}
<div class="card">
  <h1 class="card-title">New message</h1>
  <p class="card-sub">Sending as <strong>{{ user.email }}</strong></p>

  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
          <div class="field-error">{{ error }}</div>
        {% endfor %}
      </div>
    {% endfor %}
    <button class="btn btn-full" type="submit">Send email &rarr;</button>
  </form>
</div>
{% endblock %}
