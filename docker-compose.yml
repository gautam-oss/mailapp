services:
  db:
    image: postgres:16
    container_name: mailapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailapp_db
      POSTGRES_USER: mailapp_user
      POSTGRES_PASSWORD: strongpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: